name: Deploy to GCP

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: bestegg-cisc867010s26
  REGION: us-central1
  GAR_LOCATION: us-central1
  REPOSITORY: sentinel

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

      # ── Build & Push API ───────────────────────────────────────────────────
      - name: Build and Push API
        run: |
          docker build -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/api:${{ github.sha }} ./src/api
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/api:${{ github.sha }}

      # ── Build & Push Frontend ──────────────────────────────────────────────
      - name: Build and Push Frontend
        run: |
          docker build -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }} -f ./frontend/Dockerfile ./frontend
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }}

      # ── Deploy API ─────────────────────────────────────────────────────────
      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy sentinel-api \
            --image ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/api:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --timeout 300 \
            --vpc-connector sentinel-vpc-conn \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},REDIS_URL=${{ secrets.REDIS_URL }},USE_GCS=true,STORAGE_BUCKET=${{ secrets.STORAGE_BUCKET }},GCP_PROJECT_ID=${{ env.PROJECT_ID }},SENTINEL_MODE=api"

      # ── Deploy Worker ──────────────────────────────────────────────────────
      - name: Deploy Worker to Cloud Run
        run: |
          gcloud run deploy sentinel-worker \
            --image ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/api:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --no-cpu-throttling \
            --memory 2Gi \
            --timeout 300 \
            --vpc-connector sentinel-vpc-conn \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},REDIS_URL=${{ secrets.REDIS_URL }},USE_GCS=true,STORAGE_BUCKET=${{ secrets.STORAGE_BUCKET }},GCP_PROJECT_ID=${{ env.PROJECT_ID }},SENTINEL_MODE=worker"

      # ── Deploy Frontend ────────────────────────────────────────────────────
      - name: Deploy Frontend to Cloud Run
        run: |
          API_URL=$(gcloud run services describe sentinel-api --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} --format 'value(status.url)')
          gcloud run deploy sentinel-frontend \
            --image ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --vpc-connector sentinel-vpc-conn \
            --set-env-vars "API_URL=$API_URL"
